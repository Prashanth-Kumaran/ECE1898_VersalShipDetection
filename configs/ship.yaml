# Ship Detection Dataset Configuration
# Used by YOLOv5 train.py / val.py
#
# Update 'path' to match your actual project root location.

path: ../ship_detection   # Root of dataset relative to yolov5/ clone
train: dataset/images/train
val:   dataset/images/val
test:  dataset/images/test

# Number of classes
nc: 1

# Class names
names:
  0: ship

# -------------------------------------------------------------------
# Training notes:
#   - Input size: 640x640 (keep consistent for Vitis-AI quantization)
#   - Augmentation: default YOLOv5 hyp.scratch-low.yaml is fine to start
#   - If mAP is low after 100 epochs, try hyp.scratch-high.yaml
# -------------------------------------------------------------------
